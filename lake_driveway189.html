<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matterport Tour</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .embed {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }

    .embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .fallback {
      margin-top: 12px;
      color: #ddd;
      text-align: center;
    }

    .fallback a {
      color: #9ecbff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="embed">
      <iframe
        src="https://my.matterport.com/show/?m=dCQf9AyCWh5&brand=0"
        allow="fullscreen; xr-spatial-tracking; vr"
        allowfullscreen
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <p class="fallback">
      If the embed does not load, open the tour directly:
      <a href="https://my.matterport.com/show/?m=dCQf9AyCWh5&brand=0" target="_blank" rel="noopener noreferrer">
        View 3D Tour
      </a>
    </p>
  </div>
</body>
</html>
