<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matterport Tour</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px;
    }

    .embed {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
      border-radius: 8px;
    }

    .embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .fallback {
      margin: 12px 0 0;
      color: #333;
      text-align: center;
      font-size: 14px;
    }

    .fallback a {
      color: #0066cc;
      text-decoration: none;
    }

    .fallback a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 8px;
      }

      .embed {
        aspect-ratio: 4 / 3;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="embed">
      <iframe
        src="https://my.matterport.com/show/?m=dCQf9AyCWh5&brand=0"
        allow="fullscreen; xr-spatial-tracking; vr"
        allowfullscreen
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <p class="fallback">
      If the tour does not load, 
      <a href="https://my.matterport.com/show/?m=dCQf9AyCWh5&brand=0" target="_blank" rel="noopener noreferrer">
        open it directly
      </a>.
    </p>
  </div>
</body>
</html>
